<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 240 240">
  <!-- Siren lights/rays at the top (centered on cabin roof at x=157.5) -->
  <g stroke="#61605B" stroke-width="8" fill="none" stroke-linecap="round">
    <!-- Left ray -->
    <line x1="135" y1="28" x2="120" y2="15" />
    <!-- Center ray -->
    <line x1="157.5" y1="23" x2="157.5" y2="8" />
    <!-- Right ray -->
    <line x1="180" y1="28" x2="195" y2="15" />
  </g>
  
  <!-- Solid red siren dome on top of cabin roof (centered at x=157.5, y=50) -->
  <path d="M 142.5 50 A 15 15 0 0 1 172.5 50 Z" fill="#E63946" stroke="none" />
  
  <!-- Ambulance main cabin body outline -->
  <path d="M 20 68 L 140 68 L 140 50 L 175 50 L 225 110 L 225 170 L 185 170 M 135 170 L 55 170 M 20 170 L 20 68" stroke="#61605B" stroke-width="8" fill="none" stroke-linejoin="round" stroke-linecap="round" />
  
  <!-- Front window -->
  <path d="M 148 68 L 180 68 L 180 115 L 148 115 Z" stroke="#61605B" stroke-width="6" fill="none" stroke-linejoin="round" />
  
  <!-- Back handle/details -->
  <path d="M 20 100 L 20 135 M 16 100 L 16 135" stroke="#61605B" stroke-width="5" stroke-linecap="round" />
  
  <!-- Wheels (concentric outline circles) -->
  <g stroke="#61605B" stroke-width="8" fill="none">
    <circle cx="55" cy="170" r="22" />
    <circle cx="185" cy="170" r="22" />
    <!-- Wheel inner hubs -->
    <circle cx="55" cy="170" r="7" stroke="#61605B" stroke-width="5" fill="none" />
    <circle cx="185" cy="170" r="7" stroke="#61605B" stroke-width="5" fill="none" />
  </g>
  
  <!-- Red medical cross/star symbol (6-pointed Star of Life) -->
  <g fill="#E63946">
    <rect x="99" y="80" width="12" height="60" rx="3" transform="rotate(0 105 110)" />
    <rect x="99" y="80" width="12" height="60" rx="3" transform="rotate(60 105 110)" />
    <rect x="99" y="80" width="12" height="60" rx="3" transform="rotate(120 105 110)" />
  </g>
  
  <!-- Connection lines from cabin to body -->
  <line x1="140" y1="110" x2="225" y2="110" stroke="#61605B" stroke-width="8" />
  <!-- Front bumper line -->
  <line x1="225" y1="145" x2="215" y2="145" stroke="#61605B" stroke-width="6" stroke-linecap="round" />
</svg>